
[theme]
# Winter theme with day/night mode support
primaryColor = "#12BDF2"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F4F8"
textColor = "#0D2540"
font = "sans serif"

[server]
headless = true
port = 5000
address = "0.0.0.0"
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
caching = true
showErrorDetails = true
