
name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11]
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest pytest-cov bandit safety

      - name: Lint with black
        run: black --check --diff .

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Security check with bandit
        run: bandit -r . -x tests/ -f json -o bandit-report.json || true

      - name: Safety check for vulnerabilities
        run: safety check --json --output safety-report.json || true

      - name: Run tests with coverage
        run: |
          pytest --cov=utils --cov=components --cov-report=xml --cov-report=html --maxfail=1 --disable-warnings -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-reports-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
            bandit-report.json
            safety-report.json

  security_scan:
    runs-on: ubuntu-latest
    needs: lint_and_test
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy_staging:
    runs-on: ubuntu-latest
    needs: [lint_and_test, security_scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Replit (Staging)
        run: |
          echo "🚀 Deploying to Replit staging environment..."
          echo "✅ All tests passed - ready for deployment"
          echo "📊 Coverage reports generated"
          echo "🔒 Security scans completed"
          echo "🎯 Deployment would trigger Replit's deployment system"

- name: Upload test artifacts
  uses: actions/upload-artifact@v4
  if: always()
  with:
    name: test-reports-${{ matrix.python-version }}
    path: |
      coverage.xml
      htmlcov/
      bandit-report.json
      safety-report.json

  deploy_production:
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Production deployment notification
        run: |
          echo "🌟 Production deployment ready"
          echo "✨ All quality gates passed"
          echo "🔗 Deploy via Replit's deployment interface"
          echo "📈 Monitor application performance post-deployment"
