
name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:

jobs:
  update_dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools safety

      - name: Check for security vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --json --output safety-report.json || true
          
          if [ -f safety-report.json ]; then
            echo "📋 Security vulnerabilities found - check safety-report.json"
            cat safety-report.json
          fi

      - name: Check for outdated packages
        run: |
          pip list --outdated --format=json > outdated-packages.json
          
          if [ -s outdated-packages.json ]; then
            echo "📦 Outdated packages found:"
            cat outdated-packages.json
          else
            echo "✅ All packages are up to date"
          fi

      - name: Create issue for updates
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            let issueBody = '## 🔄 Weekly Dependency Update Report\n\n';
            
            // Check if outdated packages file exists and has content
            if (fs.existsSync('outdated-packages.json')) {
              const outdated = fs.readFileSync('outdated-packages.json', 'utf8');
              if (outdated.trim()) {
                issueBody += '### 📦 Outdated Packages\n```json\n' + outdated + '\n```\n\n';
              } else {
                issueBody += '### ✅ All packages are up to date\n\n';
              }
            }
            
            // Check if safety report exists
            if (fs.existsSync('safety-report.json')) {
              const safety = fs.readFileSync('safety-report.json', 'utf8');
              if (safety.trim()) {
                issueBody += '### 🔒 Security Vulnerabilities\n```json\n' + safety + '\n```\n\n';
              } else {
                issueBody += '### ✅ No security vulnerabilities found\n\n';
              }
            }
            
            issueBody += '### 🛠️ Recommended Actions\n';
            issueBody += '- [ ] Review outdated packages\n';
            issueBody += '- [ ] Update dependencies if needed\n';
            issueBody += '- [ ] Run tests after updates\n';
            issueBody += '- [ ] Address any security vulnerabilities\n\n';
            issueBody += '*This issue was automatically generated by the dependency update workflow.*';
            
            // Create or update the issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['dependencies', 'automated'],
              state: 'open'
            });
            
            const existingIssue = issues.find(issue => 
              issue.title.includes('Weekly Dependency Update')
            );
            
            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📦 Weekly Dependency Update - ${new Date().toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['dependencies', 'automated', 'maintenance']
              });
            }
